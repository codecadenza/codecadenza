@if (!readOnly) {
  <div class="form-field-table">
    <div style="display: flex; align-items: center">
      <div class="form-field-cell label-field-mandatory" i18n="@@elementcollectioneditor_lbladd">
        Add a new element:
      </div>
      <div class="form-field-cell">
        <input pInputText [(ngModel)]="newValue" type="text" style="width: calc(20vw)" id="txtAdd">
      </div>
      <div class="form-field-cell">
        <button type="button" (click)="addElement()" pButton icon="pi pi-plus"
          i18n="@@button_add" id="cmdAdd">Add</button>
      </div>
    </div>
  </div>

  <div class="form-spacer"></div>
}

<p-table [value]="filteredElements" selectionMode="single" (onRowSelect)="onRowSelect($event)" [contextMenu]="cm"
  [(contextMenuSelection)]="selectedItem">
  <ng-template pTemplate="header" let-rowData>
    <tr>
      <th i18n="@@elementcollectioneditor_colvalue">Value</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-rowData>
    <tr [pContextMenuRow]="rowData" [pSelectableRow]="rowData">
      <td>{{ convertElementToString(rowData) }}</td>
    </tr>
  </ng-template>
</p-table>

<div class="label-field-mandatory" style="padding-top: 1vw" i18n="@@elementcollectioneditor_lblstatus">
  Number of elements: {{ elements.length }}
</div>

<p-contextmenu #cm [model]="contextMenuItems" id="elementCollectionEditor_contextMenu"/>
